name: Build and publish Dataverse release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: dataverse-release-master
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build managed and unmanaged solutions
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read version from package.json
        id: version
        shell: pwsh
        run: |
          $package = Get-Content "package.json" -Raw | ConvertFrom-Json
          $version = $package.version

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "No version was found in package.json."
          }

          $tag = "v$version"

          Write-Host "Version: $version"
          Write-Host "Tag: $tag"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Check that the release does not already exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view "$env:RELEASE_TAG" 2>$null

          if ($LASTEXITCODE -eq 0) {
            throw "Release $env:RELEASE_TAG already exists. Increase the version before merging into master."
          }

          exit 0

      - name: Install dependencies
        run: npm ci

      - name: Build PCF
        run: npm run build

      - name: Build Dataverse solutions
        run: dotnet build solution/MultiLookupParty.cdsproj --configuration Release

      - name: Verify generated solutions
        shell: pwsh
        run: |
          $managed = "solution/bin/Release/MultiLookupParty_managed.zip"
          $unmanaged = "solution/bin/Release/MultiLookupParty.zip"

          if (-not (Test-Path $managed)) {
            throw "Managed solution not found: $managed"
          }

          if (-not (Test-Path $unmanaged)) {
            throw "Unmanaged solution not found: $unmanaged"
          }

          Write-Host "Managed solution:"
          Write-Host $managed

          Write-Host "Unmanaged solution:"
          Write-Host $unmanaged

      - name: Prepare release assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          New-Item `
            -ItemType Directory `
            -Path "release-assets" `
            -Force | Out-Null

          Copy-Item `
            "solution/bin/Release/MultiLookupParty_managed.zip" `
            "release-assets/MultiJunctionLookup_$env:RELEASE_VERSION`_Managed.zip"

          Copy-Item `
            "solution/bin/Release/MultiLookupParty.zip" `
            "release-assets/MultiJunctionLookup_$env:RELEASE_VERSION`_Unmanaged.zip"

          Write-Host "Prepared assets:"

          Get-ChildItem "release-assets" |
            ForEach-Object {
              Write-Host "- $($_.Name)"
            }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MultiJunctionLookup-${{ steps.version.outputs.version }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create Git tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag `
            -a "$env:RELEASE_TAG" `
            -m "Release $env:RELEASE_TAG"

          git push origin "$env:RELEASE_TAG"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $notes = @"
          ## Multi Junction Lookup PCF $env:RELEASE_TAG

          This release was automatically generated after a merge into the master branch.

          ### Downloads

          - **Managed solution**: recommended for normal installation in test and production environments.
          - **Unmanaged solution**: intended for development and customization.
          - **Source code archives**: generated automatically by GitHub and not importable into Dataverse.

          ### Installation

          1. Download one of the Dataverse solution ZIP files.
          2. Open Power Apps.
          3. Go to **Solutions**.
          4. Select **Import solution**.
          5. Import the ZIP without extracting it.
          6. Add the PCF control to a compatible text column.
          7. Configure the control properties and publish the app.

          See the repository README for the complete configuration guide.
          "@

          $notes | Set-Content `
            -Path "release-notes.md" `
            -Encoding UTF8

          gh release create "$env:RELEASE_TAG" `
            "release-assets/MultiJunctionLookup_$env:RELEASE_VERSION`_Managed.zip" `
            "release-assets/MultiJunctionLookup_$env:RELEASE_VERSION`_Unmanaged.zip" `
            --title "Multi Junction Lookup PCF $env:RELEASE_TAG" `
            --notes-file "release-notes.md" `
            --latest